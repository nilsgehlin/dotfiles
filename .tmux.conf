set -ga terminal-overrides ",xterm-256color*:Tc"
#set -s escape-time 0
set-option -sg escape-time 1
set -g mouse off
set-option -g focus-events on
set-option -g default-terminal "screen-256color"

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# split panes using | and -
bind v split-window -h
bind s split-window -v
unbind '"'
unbind %

bind r source-file ~/.tmux.conf

bind-key x kill-pane

# tmux-sessionizer
bind-key -n C-f run-shell "tmux neww tmux-sessionizer"

# Appearence
set -g base-index 1

## statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=#1F1F28 fg=#5eacd3'

set -g status-left '#[fg=#1F1F28,bg=#957fb8] #S #[fg=#957fb8,bg=#1F1F28] '
set -g status-left-length 30

set-option -g status-right ""

setw -g window-status-current-style 'fg=black bg=#957fb8'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=#957fb8 bg=#1f1f28'
setw -g window-status-format ' #I #[fg=#957fb8]#W #[fg=#957fb8]#F '

setw -g window-status-bell-style 'fg=#ffa167 bg=red bold'

# messages
set -g message-style 'fg=#ffa167 bg=red bold'




